name: Update Team Indexes

on:
  push:
    branches:
      - main
    paths:
      - 'team-memos/**/*.txt'
      - 'codex-instructions/input/**/*.txt'
      - 'codex-instructions/output/**/*.txt'
      - 'scripts/update_indexes.py'
      - '.github/workflows/update-indexes.yml'
      - '!team-memos/**/index.md'
      - '!codex-instructions/input/index.md'
      - '!codex-instructions/output/**/index.md'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-indexes:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Update indexes
        run: python3 scripts/update_indexes.py

      - name: Commit and push index updates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add team-memos codex-instructions
          git diff --cached --quiet || git commit -m "Auto-update memo and Codex indexes"
          git push
