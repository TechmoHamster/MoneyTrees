name: Update Team Indexes

on:
  push:
    branches:
      - main
    paths:
      - 'team-memos/**/*.txt'
      - '!team-memos/**/index.md'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-indexes:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Update team indexes
        run: python scripts/update_indexes.py

      - name: Commit and push index updates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add team-memos/**/index.md
          git diff --cached --quiet || git commit -m "Auto-update team memo indexes"
          git push
